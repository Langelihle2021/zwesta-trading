version: '3.8'

services:
  # Zwesta Trading Backend API
  trading-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zwesta-trading-backend
    ports:
      - "9000:9000"
    environment:
      - ZWESTA_ENV=production
      - FLASK_DEBUG=false
      - LOG_LEVEL=INFO
      - GUNICORN_WORKERS=4
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - zwesta-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # PostgreSQL Database (required for 5000+ user scaling)
    postgres:
      image: postgres:15-alpine
      container_name: zwesta-postgres
      environment:
        POSTGRES_DB: zwesta_trading
        POSTGRES_USER: zwesta
        POSTGRES_PASSWORD: zwesta_secure_2026
        PGDATA: /var/lib/postgresql/data/pgdata
      volumes:
        - postgres-data:/var/lib/postgresql/data
      ports:
        - "5432:5432"
      restart: always
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U zwesta -d zwesta_trading"]
        interval: 10s
        timeout: 5s
        retries: 5
      networks:
        - zwesta-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: zwesta-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-prod.conf:/etc/nginx/nginx.conf:ro
      - ./build/web:/usr/share/nginx/html:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - trading-backend
    restart: always
    networks:
      - zwesta-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis Cache (optional)
  redis:
    image: redis:7-alpine
    container_name: zwesta-redis
    ports:
      - "6379:6379"
    restart: always
    volumes:
      - redis-data:/data
    networks:
      - zwesta-network
    command: redis-server --appendonly yes

volumes:
  redis-data:
  postgres-data:

networks:
  zwesta-network:
    driver: bridge
