                  - name: Manually install Flutter 3.41.4
                    run: |
                      wget https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.41.4-stable.tar.xz
                      tar xf flutter_linux_3.41.4-stable.tar.xz
                      echo "$GITHUB_WORKSPACE/flutter/bin" >> $GITHUB_PATH
                      export PATH="$GITHUB_WORKSPACE/flutter/bin:$PATH"
                      flutter --version
                      dart --version
            - name: Force PATH update and print which flutter/dart
              run: |
                export PATH="$HOME/.pub-cache/bin:$PATH"
                echo $PATH
                which flutter
                which dart
                flutter --version
                dart --version
      - name: Remove preinstalled Flutter/Dart (if any)
        run: |
          sudo rm -rf /opt/hostedtoolcache/flutter
          sudo rm -rf /usr/local/bin/flutter
          sudo rm -rf /usr/local/bin/dart
          which flutter || true
          which dart || true

      - name: List all flutter/dart binaries and print PATH
        run: |
          find / -type f -name flutter 2>/dev/null || true
          find / -type f -name dart 2>/dev/null || true
          echo $PATH

name: Build APK Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'

      - name: Print Flutter & Dart Version
        run: |
          flutter --version
          dart --version
      
      - name: Clear dependency cache
        run: |
          rm -f pubspec.lock
          flutter clean
          flutter pub cache clean --all
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Get commit info
        id: commit
        run: |
          echo "message=$(git log -1 --pretty=%B)" >> $GITHUB_OUTPUT
          echo "author=$(git log -1 --pretty=%an)" >> $GITHUB_OUTPUT
          echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          tag_name: apk-${{ github.run_number }}
          body: |
            ## Zwesta Trading System - Production APK
            
            **Build #:** ${{ github.run_number }}
            **Commit SHA:** ${{ steps.commit.outputs.short_sha }}
            **Author:** ${{ steps.commit.outputs.author }}
            **Branch:** main
            
            ### What's Included
            ✅ Multi-tenant data isolation system
            ✅ User-specific session authentication
            ✅ Referral code generation (8-char unique codes)
            ✅ Real backend API integration
            ✅ Improved UI with styled logo container
            ✅ Referral code storage and display
            ✅ App title: "ZWESTA TRADING SYSTEM"
            
            ### Installation Instructions
            1. Download `flutter-app-release.apk` from the files below
            2. On your Android device, go to **Settings > Security > Unknown Sources** (enable)
            3. Open the APK file and install
            4. Launch the app
            
            ### First Time Setup
            1. Click **Register** at login
            2. Fill in: Name, Email, Username, Password
            3. Click **Register** → You'll see your unique 8-character referral code
            4. Save your code to share with others
            5. Click **Login** to access the dashboard
            
            ### Key Features
            - **Referral System:** Get 5% commission from user profits
            - **Multi-Tenant:** Each user sees only their own data
            - **Session Security:** All API calls require valid session token
            - **Cross-User Protection:** 403 error if trying to access other users' data
            
            ### Backend Requirements
            The app requires the Zwesta Trading backend running on port 9000:
            ```bash
            python multi_broker_backend_updated.py
            ```
            
            Configure API URL in: `lib/utils/environment_config.dart`
            
            ### Support
            - Backend must be running and accessible
            - Ensure `environment_config.dart` points to correct backend URL
            - Check app logs for any connection errors
          makeLatest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: zwesta-trading-apk-build-${{ github.run_number }}
          path: build/app/outputs/flutter-app-release.apk
          retention-days: 60
