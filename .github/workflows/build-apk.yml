name: Build APK Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          echo "Disk space before cleanup"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/.ghcup
          # Removed the line that deletes the Android SDK
          # sudo rm -rf /usr/local/lib/android
          sudo docker system prune -af || true
          echo "Disk space after cleanup"
          df -h
      - name: Verify Android SDK
        run: |
          echo "ANDROID_HOME=${ANDROID_HOME}"
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}"
          test -d "${ANDROID_HOME:-/usr/local/lib/android/sdk}"
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.5'
          channel: 'stable'

      - name: Print Flutter & Dart Version
        run: |
          flutter --version
          dart --version

      
      - name: Clear all caches
        run: |
          rm -rf ~/.gradle
          rm -rf android/.gradle
          flutter clean
          flutter pub cache clean --force
      
      - name: Get dependencies
        run: 'flutter pub get --enforce-lockfile'
      
      - name: Build APK
        run: 'flutter build apk --release --verbose'
      
      - name: Get commit info
        id: commit
        run: |
          echo "message=$(git log -1 --pretty=%B)" >> $GITHUB_OUTPUT
          echo "author=$(git log -1 --pretty=%an)" >> $GITHUB_OUTPUT
          echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          tag_name: apk-${{ github.run_number }}
          body: Build ${{ github.run_number }} - Zwesta Trading System APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: zwesta-trading-apk-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 60

