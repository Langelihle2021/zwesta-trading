version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: zwesta_postgres
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-xm_trader}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-SecurePassword123}
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - zwesta_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: zwesta_backend
    environment:
      DATABASE_URL: postgresql://${DATABASE_USER:-postgres}:${DATABASE_PASSWORD:-SecurePassword123}@postgres:5432/${DATABASE_NAME:-xm_trader}
      MT5_ACCOUNT: ${MT5_ACCOUNT:-136372035}
      MT5_PASSWORD: ${MT5_PASSWORD}
      MT5_SERVER: ${MT5_SERVER:-MetaQuotes-Demo}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-key-change-in-production}
      POSITION_SIZE_PERCENT: ${POSITION_SIZE_PERCENT:-2}
      STOP_LOSS_POINTS: ${STOP_LOSS_POINTS:-50}
      TAKE_PROFIT_PERCENT: ${TAKE_PROFIT_PERCENT:-1.5}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      TIMEZONE: ${TIMEZONE:-Africa/Johannesburg}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - zwesta_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend Web
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: zwesta_frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://backend:8000/api
    depends_on:
      - backend
    networks:
      - zwesta_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Redis Cache (Optional - for caching)
  redis:
    image: redis:7-alpine
    container_name: zwesta_redis
    ports:
      - "6379:6379"
    networks:
      - zwesta_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx Reverse Proxy (Optional - for production)
  nginx:
    image: nginx:alpine
    container_name: zwesta_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - zwesta_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:

networks:
  zwesta_network:
    driver: bridge
