name: zwesta_trading
description: "Professional trading mobile app for MT5 and Binance. Real-time P&L tracking, position management, and WhatsApp alerts."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.0
  riverpod: ^2.0.0
  riverpod_generator: ^2.0.0

  # HTTP & API
  http: ^1.1.0
  dio: ^5.0.0

  # Local Storage
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  shared_preferences: ^2.1.0

  # Authentication
  flutter_secure_storage: ^8.0.0
  jwt_decoder: ^2.0.0

  # UI & Charts
  fl_chart: ^0.62.0
  intl: ^0.18.0
  flutter_spinkit: ^5.2.0
  connectivity_plus: ^4.0.0

  # Utils
  uuid: ^3.0.0
  logger: ^1.4.0
  dotenv: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  riverpod_generator: ^2.0.0
  build_runner: ^2.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - .env

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
